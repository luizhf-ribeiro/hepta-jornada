{% extends 'base.html' %}{% block content %}
<section class="card"><h1>Minhas notificações</h1>
<table><tr><th>Data</th><th>Nível</th><th>Título</th><th>Mensagem</th></tr>
{% for r in rows %}<tr><td>{{ r.created_at }}</td><td>{{ r.level }}</td><td>{{ r.title }}</td><td>{{ r.message }}</td></tr>{% else %}<tr><td colspan="4">Nenhuma notificação.</td></tr>{% endfor %}
</table></section>
{% endblock %}
